<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0221">
<title>Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:  #e8ff47;
  --accent2: #ff47a3;
  --accent3: #47e8ff;
  --accent4: #ff8c47;
  --accent5: #a347ff;
  --text: #f0f0ff;
  --muted: #6060a0;
  --card-back: #130f2a;
  --card-border: #2e2550;
  --matched-bg: #0d2a1a;
  --matched-border: #47ff8a;
}

@keyframes breatheBg {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
body {
  min-height: 100vh;
  background: linear-gradient(135deg,
    #0d0221 0%, #0a1628 20%, #1a0a2e 40%,
    #0f1a0a 60%, #2a0a1a 80%, #0a0f2a 100%);
  background-size: 400% 400%;
  animation: breatheBg 10s ease infinite;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px 60px;
  overflow-x: hidden;
  cursor: none;
}

@media (hover: none) and (pointer: coarse) {
  body { cursor: auto; }
  .card, .btn { cursor: pointer; }
  #cursor { display: none; }
}

#cursor {
  position: fixed;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle, #e8ff47, #ff47a3);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 12px #e8ff47, 0 0 24px #ff47a3;
  mix-blend-mode: screen;
  transition: left 0.04s, top 0.04s;
}

.trail-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  animation: trailFade 0.6s ease forwards;
}
@keyframes trailFade {
  0%   { opacity: 0.9; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0;   transform: translate(-50%,-50%) scale(0.1); }
}

header { position: relative; z-index: 1; text-align: center; margin-bottom: 30px; }

@keyframes rainbowShift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}
h1 {
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  background: linear-gradient(90deg, #e8ff47,#47e8ff,#ff47a3,#ff8c47,#a347ff,#e8ff47);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbowShift 4s linear infinite;
}
.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 6px;
}

.stats {
  position: relative; z-index: 1;
  display: flex; gap: 28px;
  margin-bottom: 32px;
  font-family: 'DM Mono', monospace;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-label { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.stat-value {
  font-size: 1.7rem; font-weight: 500; color: var(--accent);
  transition: transform 0.15s, color 0.15s;
}
.stat-value.bump { transform: scale(1.35); color: var(--accent2); }
.divider { width: 1px; background: var(--card-border); align-self: stretch; }

.grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 520px;
  width: 100%;
}

.card {
  aspect-ratio: 3/4;
  cursor: none;
  -webkit-tap-highlight-color: transparent;
  perspective: 1200px;
  position: relative;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 14px;
  will-change: transform;
}
.card.flipped .card-inner,
.card.matched .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  border-radius: 14px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

.card-back {
  background: var(--card-back);
  border: 1px solid var(--card-border);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card-back::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 8px,
    rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 9px);
}
.card-back::before {
  content: ''; position: absolute; inset: 10px;
  border: 1px dashed rgba(255,255,255,0.07);
  border-radius: 10px;
}
.card-back-icon { font-size: 1.4rem; opacity: 0.12; z-index: 1; }

.card:hover:not(.flipped):not(.matched) .card-back {
  border-color: rgba(232,255,71,0.5);
  box-shadow:
    0 0 16px rgba(232,255,71,0.25),
    0 0 40px rgba(232,255,71,0.08),
    inset 0 0 30px rgba(232,255,71,0.06);
}

.card-front {
  background: linear-gradient(135deg, #1a1130 0%, #0e1a2e 100%);
  border: 1px solid var(--card-border);
  transform: rotateY(180deg);
  font-size: 2.6rem;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s, background 0.4s;
}

.card-front::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
  transform: skewX(-20deg);
  pointer-events: none;
}
@keyframes shimmerSweep {
  0%   { left: -100%; }
  100% { left: 150%; }
}
.card.flipped .card-front::after,
.card.matched .card-front::after {
  animation: shimmerSweep 0.5s ease 0.08s forwards;
}

.card.matched .card-front {
  background: linear-gradient(135deg, #0e2a18 0%, #0a1e12 100%);
  border-color: var(--matched-border);
  box-shadow:
    0 0 20px rgba(71,255,138,0.3),
    0 0 50px rgba(71,255,138,0.1),
    inset 0 0 30px rgba(71,255,138,0.07);
  animation: matchPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes matchPop {
  0%   { transform: rotateY(180deg) scale(1); }
  50%  { transform: rotateY(180deg) scale(1.12) rotate(2deg); }
  100% { transform: rotateY(180deg) scale(1); }
}

.card.shake .card-inner { animation: shake 0.45s ease; }
@keyframes shake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  15% { transform: rotateY(180deg) translateX(-8px) rotate(-1deg); }
  30% { transform: rotateY(180deg) translateX( 8px) rotate( 1deg); }
  45% { transform: rotateY(180deg) translateX(-6px) rotate(-0.5deg); }
  60% { transform: rotateY(180deg) translateX( 6px); }
  75% { transform: rotateY(180deg) translateX(-3px); }
}

#fireworksCanvas, #confettiCanvas {
  position: fixed; inset: 0;
  pointer-events: none;
  width: 100%; height: 100%;
}
#fireworksCanvas { z-index: 500; }
#confettiCanvas  { z-index: 590; }


.btn {
  position: relative; z-index: 1;
  margin-top: 32px; padding: 13px 36px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase;
  background: transparent; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 8px;
  cursor: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.25s, color 0.25s, box-shadow 0.25s, transform 0.15s;
}
.btn:hover {
  background: var(--accent); color: #000;
  box-shadow: 0 0 30px rgba(232,255,71,0.4), 0 0 60px rgba(232,255,71,0.15);
  transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }


.win-overlay {
  position: fixed; inset: 0;
  background: rgba(8,4,20,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 600;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
  backdrop-filter: blur(10px);
}
.win-overlay.show { opacity: 1; pointer-events: all; }
.win-title {
  font-size: clamp(3rem, 11vw, 7rem);
  font-weight: 800; letter-spacing: -0.04em;
  background: linear-gradient(90deg, #e8ff47,#47e8ff,#ff47a3,#ff8c47,#a347ff,#e8ff47);
  background-size: 300% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: rainbowShift 2s linear infinite, winBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes winBounce {
  0%   { transform: scale(0.5) rotate(-5deg); opacity: 0; }
  100% { transform: scale(1)   rotate( 0deg); opacity: 1; }
}
.win-sub {
  font-family: 'DM Mono', monospace; color: var(--muted);
  font-size: 0.85rem; letter-spacing: 0.12em;
  margin-top: 10px; margin-bottom: 28px;
}
.win-stats {
  font-family: 'DM Mono', monospace; color: var(--text);
  font-size: 1.1rem; margin-bottom: 32px;
  text-align: center; line-height: 2.2;
}
.win-stats span { color: var(--accent); }


@media (max-width: 480px) {
  body { padding: 24px 12px 80px; }
  .grid { gap: 10px; max-width: 100%; }
  .stats { gap: 18px; margin-bottom: 22px; }
  .stat-value { font-size: 1.4rem; }
  h1 { font-size: 2.2rem; }
  .card-front { font-size: 2rem; }
  .btn { padding: 12px 28px; font-size: 0.75rem; margin-top: 22px; }
  .win-stats { font-size: 0.95rem; }
}


@supports (padding: env(safe-area-inset-bottom)) {
  body { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="fireworksCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<header>
  <h1>MEMORY</h1>
  <p class="subtitle">flip · match · win</p>
</header>

<div class="stats">
  <div class="stat"><span class="stat-label">Moves</span><span class="stat-value" id="moves">0</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-label">Pairs</span><span class="stat-value" id="pairs">0</span></div>
  <div class="divider"></div>
  <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timer">0:00</span></div>
</div>

<div class="grid" id="grid"></div>
<button class="btn" id="restart">↺ New Game</button>

<div class="win-overlay" id="winOverlay">
  <div class="win-title">YOU WIN!</div>
  <p class="win-sub">all pairs matched ✦</p>
  <div class="win-stats" id="winStats"></div>
  <button class="btn" id="playAgainBtn">Play Again</button>
</div>

<script>

const _timeouts  = new Set();
const _intervals = new Set();

function safeTimeout(fn, ms) {
  const id = setTimeout(() => { _timeouts.delete(id); fn(); }, ms);
  _timeouts.add(id);
  return id;
}
function safeInterval(fn, ms) {
  const id = setInterval(fn, ms);
  _intervals.add(id);
  return id;
}
function clearAllTimers() {
  _timeouts.forEach(clearTimeout);   _timeouts.clear();
  _intervals.forEach(clearInterval); _intervals.clear();
}


const EMOJIS = ['🦊','🐬','🦋','🌙','⚡','🎲','🍄','🦚','🔮','🪐','🌊','🎸'];
const PAIRS  = 8;

let flipped=[], matched=0, moves=0, lock=false, started=false, seconds=0;

const grid       = document.getElementById('grid');
const movesEl    = document.getElementById('moves');
const pairsEl    = document.getElementById('pairs');
const timerEl    = document.getElementById('timer');
const winOverlay = document.getElementById('winOverlay');
const winStats   = document.getElementById('winStats');

const shuffle = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; };
const fmt     = s => `${0|s/60}:${String(s%60).padStart(2,'0')}`;
function bump(el){ el.classList.add('bump'); safeTimeout(()=>el.classList.remove('bump'),260); }

function newGame() {
  clearAllTimers();
  stopFireworks();
  stopConfetti();

  flipped=[]; matched=0; moves=0; lock=false; started=false; seconds=0;
  movesEl.textContent='0'; pairsEl.textContent='0'; timerEl.textContent='0:00';
  winOverlay.classList.remove('show');

  const pool  = shuffle(EMOJIS).slice(0, PAIRS);
  const cards = shuffle([...pool, ...pool]);
  grid.innerHTML = '';
  cards.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.emoji = emoji;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"><span class="card-back-icon">✦</span></div>
        <div class="card-face card-front">${emoji}</div>
      </div>`;
    el.style.cssText = 'opacity:0;transform:scale(0.7) translateY(20px);transition:opacity 0.4s ease,transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    safeTimeout(() => { el.style.opacity='1'; el.style.transform=''; }, 60 + i*40);
    el.addEventListener('click', () => flipCard(el));
    grid.appendChild(el);
  });
}

function startTimer() {
  if (started) return;
  started = true;
  safeInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);
}

function flipCard(el) {
  if (lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  startTimer();
  el.classList.add('flipped');
  flipped.push(el);
  if (flipped.length < 2) return;

  lock = true;
  moves++;
  movesEl.textContent = moves;
  bump(movesEl);

  const [a, b] = flipped;

  if (a.dataset.emoji === b.dataset.emoji) {
    safeTimeout(() => {
      if (!grid.contains(a) || !grid.contains(b)) return;
      a.classList.add('matched'); b.classList.add('matched');
      a.classList.remove('flipped'); b.classList.remove('flipped');
      flipped=[]; lock=false;
      matched++;
      pairsEl.textContent = matched;
      bump(pairsEl);
      const shoot = el => {
        const r = el.getBoundingClientRect();
        spawnFirework(
          (r.left + r.width/2)  / window.innerWidth,
          (r.top  + r.height/2) / window.innerHeight
        );
      };
      shoot(a); shoot(b);
      if (matched === PAIRS) safeTimeout(win, 500);
    }, 300);
  } else {
    
    safeTimeout(() => {
      if (!grid.contains(a) || !grid.contains(b)) return;
      a.classList.add('shake'); b.classList.add('shake');
    }, 180);
    safeTimeout(() => {
      if (!grid.contains(a) || !grid.contains(b)) return;
      a.classList.remove('flipped','shake');
      b.classList.remove('flipped','shake');
      flipped=[]; lock=false;
    }, 820);
  }
}

function win() {
  clearAllTimers();
  winStats.innerHTML = `Moves <span>${moves}</span> &nbsp;|&nbsp; Time <span>${fmt(seconds)}</span> &nbsp;|&nbsp; Pairs <span>${PAIRS}/${PAIRS}</span>`;
  winOverlay.classList.add('show');
  startRainbowConfetti();
}

document.getElementById('restart').addEventListener('click', newGame);
document.getElementById('playAgainBtn').addEventListener('click', newGame);


const cursorEl   = document.getElementById('cursor');
const trailColors = ['#e8ff47','#ff47a3','#47e8ff','#ff8c47','#a347ff','#47ff8a'];
let trailTick = 0, lastTrailX = 0, lastTrailY = 0;

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  const dx = e.clientX - lastTrailX, dy = e.clientY - lastTrailY;
  if (dx*dx + dy*dy > 64) { /* throttle by distance */
    spawnTrail(e.clientX, e.clientY);
    lastTrailX = e.clientX; lastTrailY = e.clientY;
  }
});

function spawnTrail(x, y) {
  const p   = document.createElement('div');
  p.className = 'trail-particle';
  const size = 4 + Math.random() * 7;
  const col  = trailColors[trailTick++ % trailColors.length];
  p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${col};box-shadow:0 0 ${size*2}px ${col}`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 620);
}


const fwCanvas = document.getElementById('fireworksCanvas');
const fwCtx    = fwCanvas.getContext('2d');
let fwParticles=[], fwRaf=null, fwActive=false;

(function resizeFW(){ fwCanvas.width=innerWidth; fwCanvas.height=innerHeight; })();
window.addEventListener('resize', () => { fwCanvas.width=innerWidth; fwCanvas.height=innerHeight; });

function spawnFirework(nx, ny) {
  const x = nx*fwCanvas.width, y = ny*fwCanvas.height;
  const hue = Math.random()*360;
  for (let i=0; i<40; i++) {
    const a = (i/40)*Math.PI*2, spd = 2.5+Math.random()*5;
    fwParticles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:0.018+Math.random()*0.014,
      size:2+Math.random()*3, hue:hue+Math.random()*50-25 });
  }
  if (!fwActive) runFW();
}

function runFW() {
  fwActive = true;
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParticles = fwParticles.filter(p=>p.life>0);
  fwParticles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.vx*=0.97; p.life-=p.decay;
    fwCtx.save();
    fwCtx.globalAlpha = Math.max(0,p.life);
    fwCtx.fillStyle = `hsl(${p.hue},100%,65%)`;
    fwCtx.shadowColor = `hsl(${p.hue},100%,65%)`;
    fwCtx.shadowBlur = 8;
    fwCtx.beginPath(); fwCtx.arc(p.x,p.y,p.size,0,Math.PI*2); fwCtx.fill();
    fwCtx.restore();
  });
  if (fwParticles.length>0) { fwRaf=requestAnimationFrame(runFW); }
  else { fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height); fwActive=false; }
}

function stopFireworks() {
  if (fwRaf) { cancelAnimationFrame(fwRaf); fwRaf=null; }
  fwParticles=[];
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  fwActive=false;
}

const cfCanvas = document.getElementById('confettiCanvas');
const cfCtx    = cfCanvas.getContext('2d');
let cfPieces=[], cfRaf=null, cfRunning=false;

(function resizeCF(){ cfCanvas.width=innerWidth; cfCanvas.height=innerHeight; })();
window.addEventListener('resize', () => { cfCanvas.width=innerWidth; cfCanvas.height=innerHeight; });

const CF_SHAPES = ['rect','circle','triangle'];

function startRainbowConfetti() {
  cfPieces=[];
  for (let i=0; i<170; i++) {
    cfPieces.push({
      x: Math.random()*cfCanvas.width,
      y: -20 - Math.random()*cfCanvas.height*0.6,
      size: 6+Math.random()*10,
      shape: CF_SHAPES[0|Math.random()*3],
      hue: Math.random()*360, hueSpeed: 1+Math.random()*3,
      vx: -2+Math.random()*4, vy: 2+Math.random()*4,
      rot: Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.2,
      opacity: 0.85+Math.random()*0.15
    });
  }
  cfRunning=true;
  runCF();
}

function runCF() {
  cfCtx.clearRect(0,0,cfCanvas.width,cfCanvas.height);
  cfPieces.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.04;
    p.vx+=Math.sin(p.y*0.02)*0.05;
    p.rot+=p.rotSpeed; p.hue+=p.hueSpeed;
    if (p.y > cfCanvas.height+20) { p.y=-20; p.x=Math.random()*cfCanvas.width; }
    cfCtx.save();
    cfCtx.translate(p.x,p.y); cfCtx.rotate(p.rot);
    cfCtx.globalAlpha = p.opacity;
    cfCtx.fillStyle = `hsl(${p.hue},100%,60%)`;
    cfCtx.shadowColor = `hsl(${p.hue},100%,70%)`; cfCtx.shadowBlur=6;
    if (p.shape==='rect') {
      cfCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    } else if (p.shape==='circle') {
      cfCtx.beginPath(); cfCtx.arc(0,0,p.size/2,0,Math.PI*2); cfCtx.fill();
    } else {
      cfCtx.beginPath(); cfCtx.moveTo(0,-p.size/2);
      cfCtx.lineTo(p.size/2,p.size/2); cfCtx.lineTo(-p.size/2,p.size/2);
      cfCtx.closePath(); cfCtx.fill();
    }
    cfCtx.restore();
  });
  if (cfRunning) cfRaf=requestAnimationFrame(runCF);
}

function stopConfetti() {
  cfRunning=false;
  if (cfRaf) { cancelAnimationFrame(cfRaf); cfRaf=null; }
  cfCtx.clearRect(0,0,cfCanvas.width,cfCanvas.height);
  cfPieces=[];
}

newGame();


document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  spawnTrail(t.clientX, t.clientY);
}, { passive: true });


let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
